schema_version: "0.4.0"
registry_kind: civilization-os-protocol-compatibility-registry
registry_id: kazene-core-compatibility
version: v0.4
namespace: org.kazene.civilization-os
status: draft

links:
  - link_id: origin-to-trace-v1
    source:
      stage: origin
      protocol_id: origin-trace-receipt
      versions:
        - v0.5
      record_type: origin_trace_receipt
    target:
      stage: trace
      protocol_id: trace-relay-protocol
      versions:
        - v1.0
      record_type: trace_relay_record
    canonical_id: origin_id
    disposition: compatible
    description: >-
      Allows Trace Relay v1.0 to inherit the provenance root established
      by Origin Trace Receipt v0.5.

  - link_id: origin-to-trace-v0-9
    source:
      stage: origin
      protocol_id: origin-trace-receipt
      versions:
        - v0.5
      record_type: origin_trace_receipt
    target:
      stage: trace
      protocol_id: trace-relay-protocol
      versions:
        - v0.9
      record_type: trace_relay_record
    canonical_id: origin_id
    disposition: compatible
    description: >-
      Allows legacy Trace Relay v0.9 to inherit the provenance root
      established by Origin Trace Receipt v0.5.

  - link_id: origin-to-authorization
    source:
      stage: origin
      protocol_id: origin-trace-receipt
      versions:
        - v0.5
      record_type: origin_trace_receipt
    target:
      stage: authorization
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: action_authorization_receipt
    canonical_id: origin_id
    disposition: compatible
    description: >-
      Allows the Authorization stage to reference the original
      provenance root when evaluating a requested action.

  - link_id: trace-v1-to-authorization
    source:
      stage: trace
      protocol_id: trace-relay-protocol
      versions:
        - v1.0
      record_type: trace_relay_record
    target:
      stage: authorization
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: action_authorization_receipt
    canonical_id: trace_id
    disposition: compatible
    description: >-
      Allows Trace Relay v1.0 evidence to support an authorization
      decision without requiring an adapter.

  - link_id: trace-v0-9-to-authorization
    source:
      stage: trace
      protocol_id: trace-relay-protocol
      versions:
        - v0.9
      record_type: trace_relay_record
    target:
      stage: authorization
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: action_authorization_receipt
    canonical_id: trace_id
    disposition: adapter-required
    adapter_id: trace-relay-v0-9-to-authorization-v0-5
    description: >-
      Requires an explicit registered adapter to bind the legacy Trace
      Relay v0.9 trace representation to Authorization Receipt v0.5.

  - link_id: authorization-to-execution
    source:
      stage: authorization
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: action_authorization_receipt
    target:
      stage: execution
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: authorization_execution_evidence
    canonical_id: authorization_receipt_id
    disposition: compatible
    description: >-
      Allows execution evidence to be bound to the authorization receipt
      that permitted, denied, constrained, or deferred the action.

  - link_id: trace-v1-to-execution
    source:
      stage: trace
      protocol_id: trace-relay-protocol
      versions:
        - v1.0
      record_type: trace_relay_record
    target:
      stage: execution
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: authorization_execution_evidence
    canonical_id: trace_id
    disposition: compatible
    description: >-
      Allows execution evidence to preserve its associated Trace Relay
      v1.0 chain through the canonical trace_id reference.

  - link_id: authorization-to-audit
    source:
      stage: authorization
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: action_authorization_receipt
    target:
      stage: audit
      protocol_id: agentic-marketplace-audit
      versions:
        - v0.5
      record_type: agentic_marketplace_audit_record
    canonical_id: authorization_receipt_id
    disposition: compatible
    description: >-
      Allows the Audit stage to inspect the authorization decision and
      verify the scope and constraints applied to the action.

  - link_id: execution-to-audit
    source:
      stage: execution
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: authorization_execution_evidence
    target:
      stage: audit
      protocol_id: agentic-marketplace-audit
      versions:
        - v0.5
      record_type: agentic_marketplace_audit_record
    canonical_id: execution_id
    disposition: compatible
    description: >-
      Allows the Audit stage to inspect actual execution evidence and
      compare observed behavior with the authorization receipt.

  - link_id: origin-to-royalty
    source:
      stage: origin
      protocol_id: origin-trace-receipt
      versions:
        - v0.5
      record_type: origin_trace_receipt
    target:
      stage: royalty
      protocol_id: royalty-allocation-ledger-agent
      versions:
        - v0.5
      record_type: allocation_ledger_record
    canonical_id: origin_id
    disposition: compatible
    description: >-
      Allows the Royalty stage to preserve the provenance root of the
      contribution from which economic value originated.

  - link_id: audit-to-royalty
    source:
      stage: audit
      protocol_id: agentic-marketplace-audit
      versions:
        - v0.5
      record_type: agentic_marketplace_audit_record
    target:
      stage: royalty
      protocol_id: royalty-allocation-ledger-agent
      versions:
        - v0.5
      record_type: allocation_ledger_record
    canonical_id: audit_id
    disposition: compatible
    description: >-
      Allows royalty allocation only after the associated authorization,
      execution, and contribution evidence has passed the Audit stage.

  - link_id: execution-to-royalty-direct-bypass
    source:
      stage: execution
      protocol_id: agent-action-authorization-receipt-protocol
      versions:
        - v0.5
      record_type: authorization_execution_evidence
    target:
      stage: royalty
      protocol_id: royalty-allocation-ledger-agent
      versions:
        - v0.5
      record_type: allocation_ledger_record
    canonical_id: execution_id
    disposition: blocked
    description: >-
      Prevents raw execution evidence from being connected directly to
      Royalty in a way that bypasses the mandatory Audit stage.

extensions:
  registry_owner: SamuraiWriter7
  lifecycle_scope: kazene-core
  compatibility_policy: explicit-allow
  adapter_policy: explicit-binding
  blocked_link_policy: reject
